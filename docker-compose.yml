# Production Docker Compose — Long Exposure
#
# HTTP services reachable via the workspace `proxy` network at:
#   long-exposure-prod-temporal-ui.luv
#   long-exposure-prod-adminer.luv
#
# Internal-only (no host ports, no proxy):
#   long-exposure-prod-postgres:5432           events DB (TimescaleDB)
#   long-exposure-prod-temporal-postgres:5432  temporal metadata
#   long-exposure-prod-temporal:7233           temporal gRPC
#   long-exposure-prod-worker                  Java + Temporal SDK
#
# No HTTP API and no frontend in this repo. Public `/api/long-exposure/*`
# routes are served by vedanta-systems' unified Express API
# (~/workspace/dev/vedanta-systems/src/server/routes/long-exposure.ts),
# which connects directly to long-exposure-prod-postgres over the
# luv-prod docker network. The Long Exposure browser component lives
# in ~/workspace/dev/vedanta-systems/src/components/long-exposure-browser.tsx.
#
# See deploy/INFRA-NOTES.md for the Caddyfile entries needed on luv.

name: long-exposure-prod

services:
  # ─── Events DB ─────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: long-exposure-prod-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # See docker-compose.dev.yml for full rationale. Prod runs slightly
    # larger than dev since the production dataset is the long-lived one.
    command: >
      postgres
      -c shared_buffers=2GB
      -c effective_cache_size=8GB
      -c work_mem=64MB
      -c maintenance_work_mem=512MB
    mem_limit: 8g
    volumes:
      - long-exposure-prod-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - long-exposure-prod
      - luv-prod        # so vedanta-systems-prod-api can reach the DB for /api/long-exposure/*

  # ─── Adminer for ad-hoc SQL ────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: long-exposure-prod-adminer
    environment:
      ADMINER_DEFAULT_SERVER: long-exposure-prod-postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - long-exposure-prod
      - proxy

  # ─── Temporal: separate Postgres for temporal metadata ─────────────────────
  temporal-postgres:
    image: postgres:16-alpine
    container_name: long-exposure-prod-temporal-postgres
    environment:
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_DB: temporal
    volumes:
      - long-exposure-prod-temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - long-exposure-prod

  temporal:
    image: temporalio/auto-setup:latest
    container_name: long-exposure-prod-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_POSTGRES_USER}
      - POSTGRES_PWD=${TEMPORAL_POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=long-exposure-prod-temporal-postgres
      - BIND_ON_IP=0.0.0.0
      - LOG_LEVEL=warn
    depends_on:
      temporal-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - long-exposure-prod

  temporal-ui:
    image: temporalio/ui:latest
    container_name: long-exposure-prod-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=long-exposure-prod-temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://long-exposure-prod-temporal-ui.${BASE_DOMAIN:-luv}
    depends_on:
      - temporal
    restart: unless-stopped
    networks:
      - long-exposure-prod
      - proxy

  # ─── Java worker: pcap parsing + Temporal activities + DB writes ───────────
  worker:
    build:
      context: ./parser
      dockerfile: Dockerfile
    image: long-exposure-prod-worker:latest
    container_name: long-exposure-prod-worker
    env_file: .env
    environment:
      APP_ENV: production
      TEMPORAL_HOST: long-exposure-prod-temporal:7233
      POSTGRES_HOST: long-exposure-prod-postgres
      POSTGRES_PORT: "5432"
    # JVM is -Xmx8g (see parser/build.gradle.kts). 12g container cap leaves
    # 4g headroom for JVM overhead. Same as dev.
    mem_limit: 12g
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - long-exposure-prod
      - luv-prod        # to reach llama-large.joi via tailnet split-DNS

  # No HTTP API in this repo. Read-only access to narratives is served
  # by the vedanta-systems unified API (src/server/routes/long-exposure.ts)
  # which connects directly to long-exposure-prod-postgres over the
  # luv-prod docker network. The worker is the only ingress: Temporal
  # cron + activities are the data plane, no inbound HTTP needed.

volumes:
  long-exposure-prod-postgres-data:
    name: long-exposure-prod-postgres-data
  long-exposure-prod-temporal-postgres-data:
    name: long-exposure-prod-temporal-postgres-data

networks:
  long-exposure-prod:
    name: long-exposure-prod
    driver: bridge

  # Workspace-shared networks (created externally; see ~/workspace/proxy/README.md).
  proxy:
    name: proxy
    external: true
  luv-prod:
    name: luv-prod
    external: true
