server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api is fronted by Caddy (workspace proxy); the frontend container
    # never speaks to the api container directly. This block exists only
    # to make the SPA fail clearly if reached without Caddy in front.
    location /api/ {
        return 502 'API must be reached through the workspace proxy.';
        add_header Content-Type text/plain;
    }
}
