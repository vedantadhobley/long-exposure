# Development Docker Compose — Long Exposure
#
# Dev variant of docker-compose.yml. Differences:
#   - container_name suffix is `-dev` (so URLs become long-exposure-dev-*.luv)
#   - source code bind-mounted into worker for hot reload
#   - separate volumes for dev DB so dev/prod don't share state
#
# HTTP services reachable via the workspace `proxy` network at:
#   long-exposure-dev-temporal-ui.luv
#   long-exposure-dev-adminer.luv
#
# No HTTP API in this repo and no frontend in this repo. The
# vedanta-systems unified API (src/server/routes/long-exposure.ts)
# connects directly to long-exposure-dev-postgres over the luv-dev
# docker network and serves /api/long-exposure/* publicly. The Long
# Exposure worker is the data plane — Temporal cron + activities, no
# inbound HTTP needed.

name: long-exposure-dev

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: long-exposure-dev-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Override TimescaleDB's auto-tune. The default sees 125 GB host RAM
    # and assumes it owns the box → shared_buffers ≈ 31 GB. We share with
    # legal-tender's ArangoDB and dev tooling, so cap aggressively. These
    # are still healthy values for a dev DB.
    command: >
      postgres
      -c shared_buffers=1GB
      -c effective_cache_size=2GB
      -c work_mem=32MB
      -c maintenance_work_mem=256MB
    mem_limit: 4g
    volumes:
      - long-exposure-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - long-exposure-dev
      - luv-dev        # so vedanta-systems-dev-api can reach the DB for /api/long-exposure/*

  adminer:
    image: adminer:latest
    container_name: long-exposure-dev-adminer
    environment:
      ADMINER_DEFAULT_SERVER: long-exposure-dev-postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - long-exposure-dev
      - proxy

  temporal-postgres:
    image: postgres:16-alpine
    container_name: long-exposure-dev-temporal-postgres
    environment:
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD}
      POSTGRES_DB: temporal
    volumes:
      - long-exposure-dev-temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - long-exposure-dev

  temporal:
    image: temporalio/auto-setup:latest
    container_name: long-exposure-dev-temporal
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${TEMPORAL_POSTGRES_USER}
      - POSTGRES_PWD=${TEMPORAL_POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=long-exposure-dev-temporal-postgres
      - BIND_ON_IP=0.0.0.0
    depends_on:
      temporal-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - long-exposure-dev

  temporal-ui:
    image: temporalio/ui:latest
    container_name: long-exposure-dev-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=long-exposure-dev-temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://long-exposure-dev-temporal-ui.${BASE_DOMAIN:-luv}
    depends_on:
      - temporal
    restart: unless-stopped
    networks:
      - long-exposure-dev
      - proxy

  worker:
    build:
      context: ./parser
      dockerfile: Dockerfile.dev
    image: long-exposure-dev-worker:latest
    container_name: long-exposure-dev-worker
    env_file: .env
    environment:
      APP_ENV: development
      TEMPORAL_HOST: long-exposure-dev-temporal:7233
      POSTGRES_HOST: long-exposure-dev-postgres
      POSTGRES_PORT: "5432"
      # When IEX_PCAP_FILE is unset the worker boots into Temporal worker
      # mode. Set on the host (or `docker compose run -e ...`) to drop
      # back to the smoke-test / cross-validation CLI in Main.java.
      IEX_PCAP_FILE: ${IEX_PCAP_FILE:-}
      IEX_PRINT_LIMIT: ${IEX_PRINT_LIMIT:-20}
      IEX_WRITE_DB: ${IEX_WRITE_DB:-false}
    # JVM is -Xmx8g (see parser/build.gradle.kts). 12g container cap leaves
    # 4g headroom for JVM overhead (direct buffers, JIT, native libs).
    # Hard ceiling so even a misconfiguration can't OOM the host.
    mem_limit: 12g
    volumes:
      - ./parser:/app
      - long-exposure-dev-gradle-cache:/root/.gradle
      # Project data dir (HIST .pcap.gz files, specs, etc.). The Temporal
      # worker downloads to /storage/raw/, so this needs to be RW.
      # Convention: ~/workspace/data/<project> → /storage.
      - ${HOME}/workspace/data/long-exposure:/storage
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - long-exposure-dev
      - luv-dev

  # No HTTP API in this repo. Read-only access to narratives is served
  # by the vedanta-systems unified API (src/server/routes/long-exposure.ts)
  # which connects directly to long-exposure-dev-postgres over the
  # luv-dev docker network. The worker is the only ingress: Temporal
  # cron + activities are the data plane, no inbound HTTP needed.

volumes:
  long-exposure-dev-postgres-data:
    name: long-exposure-dev-postgres-data
  long-exposure-dev-temporal-postgres-data:
    name: long-exposure-dev-temporal-postgres-data
  long-exposure-dev-gradle-cache:
    name: long-exposure-dev-gradle-cache

networks:
  long-exposure-dev:
    name: long-exposure-dev
    driver: bridge
  proxy:
    name: proxy
    external: true
  luv-dev:
    name: luv-dev
    external: true
